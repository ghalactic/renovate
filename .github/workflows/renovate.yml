name: Renovate
run-name: Renovate

on:
  repository_dispatch:
    types: [maintainDependencies]

  workflow_dispatch:
    inputs:
      debug:
        description: Debug logging
        required: true
        type: boolean
        default: false

      dryRun:
        description: Dry run
        required: true
        type: boolean
        default: false

      repositoryFilter:
        description: Repository filter (regex or glob, comma-separated)
        required: false
        type: string
        default: ""

jobs:
  renovate:
    runs-on: ubuntu-latest
    name: Renovate

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          configurationFile: .github/renovate.runner.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ github.event.inputs.debug == 'true' && 'debug' || 'info' }}
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.event.inputs.repositoryFilter || '' }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dryRun == 'true' && 'full' || '' }}
